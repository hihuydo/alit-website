services:
  alit-web:
    build: .
    container_name: alit-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - SITE_URL=https://alit.hihuydo.com
      - IP_HASH_SALT=${IP_HASH_SALT}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Tier-2 container hardening (Sprint E, 2026-04-19):
    # - `no-new-privileges` blocks setuid/setcap-based escalation inside the
    #   container. Next.js doesn't need any privileged exec paths.
    # - `cap_drop: [ALL]` — Next.js is a plain Node process bound to a
    #   non-privileged port (3000 → mapped). No Linux capability is needed.
    #   Tier-0 non-root user (UID 1001) is already set in the Dockerfile.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Read-only root filesystem (Tier-2 hardening, Sprint F, 2026-04-19).
    # Next.js 16 standalone output reads everything from baked-in layers;
    # the only runtime-writes are to `/tmp` and `.next/cache` (internal
    # fetch-cache, data-cache, image-cache — we don't use next/image so
    # it's mostly empty, but Next.js may still create the directory).
    # Uploads go to PostgreSQL as BYTEA, not filesystem.
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    # Resource bounds. Observed from `docker stats`: idle ~51 MiB, near-zero
    # CPU. Limits are generous headroom; reservations are a soft floor.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      # Use 127.0.0.1 explicitly — `localhost` resolves to ::1 (IPv6) in the
      # container but Next.js only binds IPv4, causing connection refused.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
