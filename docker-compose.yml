services:
  alit-web:
    build: .
    container_name: alit-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - SITE_URL=https://alit.hihuydo.com
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Use 127.0.0.1 explicitly — `localhost` resolves to ::1 (IPv6) in the
      # container but Next.js only binds IPv4, causing connection refused.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
