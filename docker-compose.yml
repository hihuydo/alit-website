services:
  alit-web:
    build: .
    container_name: alit-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
