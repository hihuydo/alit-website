server {
    server_name staging.alit.hihuydo.com;

    client_max_body_size 55m;

    # Staging access gate — prevents Google indexing (401 is a hard
    # anti-crawl signal, unlike noindex which Googlebot may still crawl)
    # and hides pre-launch work from public + competitors. Prod
    # (nginx/alit.conf) stays unauthenticated.
    #
    # htpasswd lives at /etc/nginx/htpasswd-alit-staging (outside repo).
    # Regenerate via: sudo htpasswd -c /etc/nginx/htpasswd-alit-staging <user>
    #
    # Scope: server-level gate on every path. Admins visiting /dashboard/
    # get one Basic Auth prompt per browser session (browser caches the
    # Authorization header for the origin after first success) plus the
    # normal JWT login form — NOT a per-request double-prompt. Earlier
    # attempt to bypass /dashboard/* would have left /_next/static/* and
    # /dashboard (no trailing slash) still gated on the server-level
    # rule, producing a spurious Basic Auth challenge mid-page-load when
    # the login page's JS chunks are fetched (Codex PR #111 R1 [P1]).
    #
    # Only operational endpoints are exempt:
    #   (a) /.well-known/acme-challenge/ — certbot renewal
    #   (b) /api/health/                 — Docker / CI / uptime
    auth_basic "alit staging – closed beta";
    auth_basic_user_file /etc/nginx/htpasswd-alit-staging;

    # Block dotfile paths anywhere in URI — covers /.env, /.git, /.git/HEAD etc.
    location ~ /\.(env|git|ht|DS_Store|svn)(/|$) {
        deny all;
        return 404;
    }

    # T0 security headers. Inherited by location / because that block sets no
    # add_header of its own. See patterns/deployment-nginx.md.
    # X-Robots-Tag keeps staging out of search indexes; complements src/app/robots.ts.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # T1 Sprint S — origin isolation (site-wide). Mirrors prod config;
    # staging must match so smoke-testing OG/media compat on staging is a
    # faithful dry-run for prod.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ACME HTTP-01 challenge — certbot uses --authenticator=nginx which
    # temporarily injects its own location, but exempting the path
    # defensively ensures renewal never depends on auth_basic behavior.
    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        allow all;
        try_files $uri =404;
    }

    # Healthcheck — auth-free so Docker/CI/external monitoring keeps
    # working on staging. No sensitive data returned (plain "ok" 200).
    location = /api/health/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:3102;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3102;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/staging.alit.hihuydo.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/staging.alit.hihuydo.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = staging.alit.hihuydo.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name staging.alit.hihuydo.com;
    return 404; # managed by Certbot
}
