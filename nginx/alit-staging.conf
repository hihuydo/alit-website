server {
    server_name staging.alit.hihuydo.com;

    client_max_body_size 55m;

    # Block dotfile paths anywhere in URI — covers /.env, /.git, /.git/HEAD etc.
    location ~ /\.(env|git|ht|DS_Store|svn)(/|$) {
        deny all;
        return 404;
    }

    # T0 security headers. Inherited by every location block that sets no
    # add_header of its own. See patterns/deployment-nginx.md for the
    # inheritance trap.
    # X-Robots-Tag keeps staging out of search indexes; complements src/app/robots.ts.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # T1 Sprint S — origin isolation (site-wide). Mirrors prod config;
    # staging must match so smoke-testing OG/media compat on staging is a
    # faithful dry-run for prod.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Healthcheck — exact match, sibling to location /, so it does NOT
    # inherit the Basic Auth inside location /. Keeps Docker healthcheck,
    # CI smoke, and external uptime monitoring unblocked on staging.
    location = /api/health/ {
        proxy_pass http://127.0.0.1:3102;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Staging access gate — prevents Google indexing (401 is a hard
    # anti-crawl signal, unlike noindex which Googlebot may still crawl)
    # and hides pre-launch work from public + competitors. Prod
    # (nginx/alit.conf) stays unauthenticated.
    #
    # htpasswd lives at /etc/nginx/htpasswd-alit-staging (outside repo).
    # Regenerate via: sudo htpasswd -c /etc/nginx/htpasswd-alit-staging <user>
    #
    # ⚠️ Intentionally scoped to this location block — NOT server-level —
    # so certbot's --authenticator=nginx can inject its temporary ACME
    # challenge location at renewal time without inheriting auth_basic.
    # An earlier iteration put auth_basic at server level with a custom
    # `location ^~ /.well-known/acme-challenge/` bypass; that bypass
    # shadowed certbot's own regex-based injection (^~ beats regex) and
    # would have silently broken renewal after 90 days (Codex PR #111
    # R2 [P1]). See patterns/deployment-nginx.md and
    # patterns/deployment-staging.md for the inheritance rationale.
    #
    # Admins hit one Basic Auth prompt per browser session (browser
    # caches the Authorization header for the origin) plus the normal
    # dashboard JWT login — NOT a per-request double prompt.
    location / {
        auth_basic "alit staging – closed beta";
        auth_basic_user_file /etc/nginx/htpasswd-alit-staging;

        proxy_pass http://127.0.0.1:3102;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/staging.alit.hihuydo.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/staging.alit.hihuydo.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = staging.alit.hihuydo.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name staging.alit.hihuydo.com;
    return 404; # managed by Certbot
}
