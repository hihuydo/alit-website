server {
    listen 80;
    server_name staging.alit.hihuydo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name staging.alit.hihuydo.com;

    ssl_certificate /etc/letsencrypt/live/staging.alit.hihuydo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.alit.hihuydo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 55m;

    # Block dotfile paths anywhere in URI — includes /.git/HEAD, /.env, /.env/anything etc.
    location ~ /\.(env|git|ht|DS_Store|svn)(/|$) {
        deny all;
        return 404;
    }

    # Server-level security headers. Must be repeated in every location block that
    # sets its own add_header — nginx drops inherited headers once a child block
    # has any of its own. See patterns/deployment-nginx.md.
    # X-Robots-Tag keeps staging out of search indexes; complements src/app/robots.ts.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Cache static assets (Next.js hashes filenames)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3102;
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # Cache fonts
    location /fonts/ {
        proxy_pass http://127.0.0.1:3102;
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # Proxy to Next.js (staging container on port 3102)
    location / {
        proxy_pass http://127.0.0.1:3102;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
