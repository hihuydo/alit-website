server {
    listen 80;
    server_name alit.hihuydo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name alit.hihuydo.com;

    ssl_certificate /etc/letsencrypt/live/alit.hihuydo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alit.hihuydo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets (Next.js hashes filenames)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Cache fonts
    location /fonts/ {
        proxy_pass http://127.0.0.1:3100;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
