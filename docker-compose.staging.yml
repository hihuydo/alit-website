services:
  alit-staging:
    build: .
    container_name: alit-staging
    restart: unless-stopped
    ports:
      - "127.0.0.1:3102:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - SITE_URL=https://staging.alit.hihuydo.com
      - IP_HASH_SALT=${IP_HASH_SALT}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Tier-2 container hardening (Sprint E, 2026-04-19) — mirror of
    # docker-compose.yml. See that file for rationale.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      # Use 127.0.0.1 explicitly — `localhost` resolves to ::1 (IPv6) in the
      # container but Next.js only binds IPv4, causing connection refused.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
