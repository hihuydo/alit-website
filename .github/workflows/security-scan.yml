name: Security Scan

# Trivy scan for filesystem (dependency CVEs + Dockerfile misconfig) + optional
# full image scan. Filesystem+config scan runs on every PR so it's part of the
# review loop. Image scan runs on main push + weekly to catch base-image-layer
# drift.
#
# Actions are SHA-pinned per patterns/deployment-cicd.md. Update notes:
#  - actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Node 24)
#  - aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
#
# `FORCE_JAVASCRIPT_ACTIONS_TO_NODE24` forces all JS-based actions (including
# trivy-action's internal `actions/cache` dependency) to run on Node 24. GitHub
# Actions deprecation: Node 20 runners gone after 2026-09-16.
#
# Fails on HIGH/CRITICAL findings with a fix available. `ignore-unfixed: true`
# prevents noise from unfixed CVEs in base image that we can't action on (we
# can upgrade the base image, but a single unfixed CVE shouldn't block every
# PR until then).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # Monday 04:00 UTC

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

# Force Node 24 for all JavaScript-based actions. Without this,
# actions transitively pulling older Node 20-pinned deps (e.g.
# trivy-action uses actions/cache internally) produce deprecation
# warnings and will break after 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  trivy-fs:
    name: Filesystem + Config scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Trivy filesystem scan (deps CVEs)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

      - name: Trivy config scan (Dockerfile + IaC misconfig)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table

  trivy-image:
    name: Docker image scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Image scan is heavier — only run on main-push and scheduled runs, not PRs.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build image (local tag, not pushed)
        run: docker build -t alit-website:scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: alit-website:scan
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
